<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Profile · The Spectrum</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0a0a08;--paper:#f5f2ec;
      --surface:#0f0f0d;--surface2:#161614;
      --border:rgba(255,255,255,0.07);
      --text:#e8e4dc;--muted:rgba(232,228,220,0.38);
      --accent-y:#f5c800;--accent-g:#1db954;
      --spectrum:linear-gradient(90deg,#e63323,#f5c800,#1db954,#1a6cff,#9b3dff);
      --mono:'DM Mono',monospace;--pad:16px;
      --color:#000000;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--ink);color:var(--text);font-family:'Manrope',sans-serif;overflow-x:hidden;}
    .spectrum-bar{height:3px;background:var(--spectrum);}

    /* NAV */
    .topnav{position:sticky;top:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad);}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .nav-logo{width:24px;height:24px;border-radius:50%;background:var(--spectrum);}
    .nav-brand-text{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.06em;color:var(--text);}
    .nav-back{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.06em;display:flex;align-items:center;gap:6px;transition:color .2s;}
    .nav-back:hover{color:var(--text);}
    .nav-cta{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:var(--accent-y);color:var(--ink);border:none;padding:7px 16px;cursor:pointer;text-decoration:none;white-space:nowrap;}

    /* HERO SWATCH */
    .color-hero{
      height:42vh;min-height:220px;max-height:380px;
      background:var(--color);
      position:relative;
      display:flex;align-items:flex-end;
      transition:background .3s;
    }
    .hero-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 60%);
    }
    .hero-content{position:relative;z-index:1;padding:28px var(--pad);width:100%;}
    .hero-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border:1px solid;margin-bottom:12px;}
    .hero-badge.launched{border-color:var(--accent-y);color:var(--accent-y);}
    .hero-badge.available{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.6);}
    .hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,12vw,96px);letter-spacing:.01em;line-height:.9;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.4);}

    /* CONTENT GRID */
    .content{padding:28px var(--pad) 60px;}

    /* CODE CARDS */
    .code-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .code-card{background:var(--surface2);border:1px solid var(--border);padding:16px 18px;}
    .code-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .code-value{font-family:var(--mono);font-size:15px;color:var(--text);letter-spacing:.04em;display:flex;align-items:center;gap:10px;}
    .copy-btn{font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:3px 8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .copy-btn:hover{border-color:var(--accent-y);color:var(--accent-y);}

    /* PREVIEW SWATCHES */
    .preview-section{margin-bottom:24px;}
    .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
    .swatch-row{display:flex;gap:8px;}
    .swatch-block{flex:1;border-radius:0;}
    .swatch-block.main{height:64px;}
    .swatch-block.tint{height:40px;opacity:.7;}
    .swatch-block.shade{height:40px;filter:brightness(.6);}

    /* DESCRIPTION */
    .desc-block{background:var(--surface2);border:1px solid var(--border);padding:20px;margin-bottom:20px;}
    .desc-text{font-size:14px;line-height:1.8;color:rgba(232,228,220,.65);}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:24px;}
    .stat-cell{background:var(--surface2);padding:16px 18px;}
    .stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .stat-value{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;color:var(--text);}
    .stat-value.launched-val{color:var(--accent-y);}

    /* CTA */
    .cta-block{border:1px solid var(--border);padding:24px 20px;text-align:center;}
    .cta-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;margin-bottom:8px;}
    .cta-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
    .cta-btn{display:inline-block;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:var(--accent-y);color:var(--ink);border:none;padding:12px 28px;cursor:pointer;text-decoration:none;}
    .cta-btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);margin-top:8px;}

    /* NEARBY */
    .nearby{margin-top:28px;}
    .nearby-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
    .nearby-card{flex-shrink:0;width:100px;text-decoration:none;border:1px solid var(--border);transition:border-color .2s;}
    .nearby-card:hover{border-color:rgba(255,255,255,.2);}
    .nearby-swatch{height:60px;}
    .nearby-body{background:var(--surface2);padding:8px 10px;}
    .nearby-name{font-family:var(--mono);font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--accent-y);color:var(--ink);font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:8px 20px;transition:all .25s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(min-width:600px){
      :root{--pad:32px;}
      .code-row{grid-template-columns:1fr 1fr 1fr;}
      .stats-grid{grid-template-columns:repeat(4,1fr);}
    }
    @media(min-width:900px){
      :root{--pad:48px;}
      .content{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start;}
      .content-left{}
      .content-right{}
    }
  </style>
</head>
<body>
<div class="spectrum-bar"></div>

<nav class="topnav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo"></div>
    <span class="nav-brand-text">Paint The Chain</span>

  <div style="display:flex;align-items:center;gap:16px;">

<div class="color-hero" id="colorHero">

    <div class="stats-grid" id="statsGrid"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SAME COLOR DATA (subset needed for nearby) ──
const COLORS = [
  {name:'Red',hex:'#FF0000',rgb:'255,0,0',family:'Red',launched:true,coin:'$RED'},
  {name:'Crimson',hex:'#DC143C',rgb:'220,20,60',family:'Red',launched:false},

  {name:'Salmon',hex:'#FA8072',rgb:'250,128,114',family:'Red',launched:false},

  {name:'Firebrick',hex:'#B22222',rgb:'178,34,34',family:'Red',launched:false},

  {name:'Pink',hex:'#FFC0CB',rgb:'255,192,203',family:'Pink',launched:false},
  {name:'LightPink',hex:'#FFB6C1',rgb:'255,182,193',family:'Pink',launched:false},
  {name:'MediumVioletRed',hex:'#C71585',rgb:'199,21,133',family:'Pink',launched:false},

  {name:'OrangeRed',hex:'#FF4500',rgb:'255,69,0',family:'Orange',launched:false},
  {name:'DarkOrange',hex:'#FF8C00',rgb:'255,140,0',family:'Orange',launched:false},
  {name:'Orange',hex:'#FFA500',rgb:'255,165,0',family:'Orange',launched:false},
  {name:'Coral',hex:'#FF7F50',rgb:'255,127,80',family:'Orange',launched:false},
  {name:'Yellow',hex:'#FFFF00',rgb:'255,255,0',family:'Yellow',launched:false},
  {name:'Gold',hex:'#FFD700',rgb:'255,215,0',family:'Yellow',launched:false},
  {name:'LightYellow',hex:'#FFFFE0',rgb:'255,255,224',family:'Yellow',launched:false},
  {name:'Khaki',hex:'#F0E68C',rgb:'240,230,140',family:'Yellow',launched:false},
  {name:'DarkKhaki',hex:'#BDB76B',rgb:'189,183,107',family:'Yellow',launched:false},
  {name:'Green',hex:'#008000',rgb:'0,128,0',family:'Green',launched:true,coin:'$GREEN'},
  {name:'Lime',hex:'#00FF00',rgb:'0,255,0',family:'Green',launched:false},
  {name:'LimeGreen',hex:'#32CD32',rgb:'50,205,50',family:'Green',launched:false},
  {name:'ForestGreen',hex:'#228B22',rgb:'34,139,34',family:'Green',launched:false},
  {name:'DarkGreen',hex:'#006400',rgb:'0,100,0',family:'Green',launched:false},
  {name:'SeaGreen',hex:'#2E8B57',rgb:'46,139,87',family:'Green',launched:false},
  {name:'Chartreuse',hex:'#7FFF00',rgb:'127,255,0',family:'Green',launched:false},
  {name:'Olive',hex:'#808000',rgb:'128,128,0',family:'Green',launched:false},
  {name:'Cyan',hex:'#00FFFF',rgb:'0,255,255',family:'Cyan',launched:false},
  {name:'Teal',hex:'#008080',rgb:'0,128,128',family:'Cyan',launched:false},
  {name:'Turquoise',hex:'#40E0D0',rgb:'64,224,208',family:'Cyan',launched:false},
  {name:'Aquamarine',hex:'#7FFFD4',rgb:'127,255,212',family:'Cyan',launched:false},
  {name:'Blue',hex:'#0000FF',rgb:'0,0,255',family:'Blue',launched:true,coin:'$BLUE'},
  {name:'Navy',hex:'#000080',rgb:'0,0,128',family:'Blue',launched:false},
  {name:'RoyalBlue',hex:'#4169E1',rgb:'65,105,225',family:'Blue',launched:false},
  {name:'DodgerBlue',hex:'#1E90FF',rgb:'30,144,255',family:'Blue',launched:false},
  {name:'DeepSkyBlue',hex:'#00BFFF',rgb:'0,191,255',family:'Blue',launched:false},
  {name:'SteelBlue',hex:'#4682B4',rgb:'70,130,180',family:'Blue',launched:false},
  {name:'Purple',hex:'#800080',rgb:'128,0,128',family:'Purple',launched:false},
  {name:'Magenta',hex:'#FF00FF',rgb:'255,0,255',family:'Purple',launched:false},
  {name:'Violet',hex:'#EE82EE',rgb:'238,130,238',family:'Purple',launched:false},
  {name:'Indigo',hex:'#4B0082',rgb:'75,0,130',family:'Purple',launched:false},
  {name:'Lavender',hex:'#E6E6FA',rgb:'230,230,250',family:'Purple',launched:false},
  {name:'Brown',hex:'#A52A2A',rgb:'165,42,42',family:'Brown',launched:false},
  {name:'Sienna',hex:'#A0522D',rgb:'160,82,45',family:'Brown',launched:false},
  {name:'Chocolate',hex:'#D2691E',rgb:'210,105,30',family:'Brown',launched:false},
  {name:'Peru',hex:'#CD853F',rgb:'205,133,63',family:'Brown',launched:false},
  {name:'Tan',hex:'#D2B48C',rgb:'210,180,140',family:'Brown',launched:false},
  {name:'White',hex:'#FFFFFF',rgb:'255,255,255',family:'White',launched:false},
  {name:'Ivory',hex:'#FFFFF0',rgb:'255,255,240',family:'White',launched:false},
  {name:'Beige',hex:'#F5F5DC',rgb:'245,245,220',family:'White',launched:false},
  {name:'Silver',hex:'#C0C0C0',rgb:'192,192,192',family:'Gray',launched:false},
  {name:'Gray',hex:'#808080',rgb:'128,128,0',family:'Gray',launched:false},
  {name:'DimGray',hex:'#696969',rgb:'105,105,105',family:'Gray',launched:false},
  {name:'Black',hex:'#000000',rgb:'0,0,0',family:'Gray',launched:false},
];

const DESCRIPTIONS = {
  Red: "The most primal of colors — red commands attention before the eye has time to deliberate. Associated with energy, urgency, passion, and danger across almost every human culture.",
  Crimson: "A rich, dark red with a slight blue undertone. Historically the color of royalty and victory in ancient Rome, and a staple of heraldry and ceremony.",
  Tomato: "A warm orange-red that bridges energy and approachability. Named after the fruit, it carries both the urgency of red and the friendliness of orange.",
  Blue: "The world's most universally liked color. Associated with trust, depth, and stability — blue is the color of sky, ocean, and the infinite.",
  Navy: "Deep, authoritative, and timeless. Navy blue carries the weight of maritime tradition and is one of the few colors that commands both formality and confidence.",
  Green: "The color of life, growth, and balance. Green sits at the center of the visible spectrum and is the easiest color for the human eye to distinguish.",
  Lime: "Electric and synthetic, lime green radiates with the energy of the digital age. A descendant of green, optimized for maximum visual intensity.",
  White: "The presence of all colors combined. White represents purity, simplicity, and infinite possibility — the blank canvas before creation begins.",
  Black: "The absence of light, the presence of everything. Black anchors all other colors and is the foundation of legibility, contrast, and visual drama.",
  Gold: "The color of value, achievement, and divinity. Gold has driven human ambition for millennia — from ancient tombs to digital trophy icons.",
  Silver: "Reflective and neutral, silver suggests precision, modernity, and technological cool. It is the color of tools, machines, and the future.",
  Purple: "Historically the rarest pigment and the color of emperors. Purple occupies the edge of the visible spectrum, bridging red's passion with blue's calm.",
  Orange: "High-energy and sociable, orange combines the heat of red with the optimism of yellow. It is the color of harvest, warmth, and creative momentum.",
  Pink: "A softened red, pink balances passion with tenderness. Once considered a masculine color in European tradition, it has evolved into a complex cultural signal.",
  Cyan: "The color at the intersection of green and blue — cool, digital, and precise. Cyan is a primary color in printing and a staple of the digital world.",
  Teal: "A sophisticated blend of blue and green, teal sits confidently between the two. It suggests both the calm of the sea and the growth of nature.",
  Brown: "Earthy and grounding, brown is the color of soil, wood, and the natural world. It communicates reliability, warmth, and permanence.",
  Gray: "The color of neutrality and restraint. Gray refuses to take sides — it provides the context in which all other colors are read.",
};

function getDescription(name, family) {
  return DESCRIPTIONS[name] || DESCRIPTIONS[family] || `${name} is a member of the ${family} color family in the CSS named color spectrum. Each named color carries its own history, associations, and place within the visual language of the web.`;
}

function hexToHSL(hex) {
  let r = parseInt(hex.slice(1,3),16)/255,
      g = parseInt(hex.slice(3,5),16)/255,
      b = parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
    h/=6;
  }
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function isLight(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b) > 160;
}

function copy(text) {
  navigator.clipboard?.writeText(text).catch(()=>{});
  const t = document.getElementById('toast');
  t.textContent = 'Copied!';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function colorUrl(c) {
  return `spectrum-profile.html?name=${encodeURIComponent(c.name)}&hex=${encodeURIComponent(c.hex)}&rgb=${encodeURIComponent(c.rgb)}&family=${encodeURIComponent(c.family)}&launched=${c.launched}&coin=${encodeURIComponent(c.coin||'')}`;
}

// Parse URL params
const params = new URLSearchParams(window.location.search);
const colorName   = params.get('name')    || 'Blue';
const colorHex    = params.get('hex')     || '#0000FF';
const colorRgb    = params.get('rgb')     || '0,0,255';
const colorFamily = params.get('family')  || 'Blue';
const isLaunched  = params.get('launched') === 'true';
const coinName    = params.get('coin')    || '';

// Set page title
document.title = `${colorName} · The Spectrum`;

// Set CSS var
document.documentElement.style.setProperty('--color', colorHex);

// Hero
document.getElementById('colorHero').style.background = colorHex;
document.getElementById('heroName').textContent = colorName;
document.getElementById('heroBadge').textContent = isLaunched ? `● ${coinName} · Launched` : 'Available for Launch';
document.getElementById('heroBadge').className = 'hero-badge ' + (isLaunched ? 'launched' : 'available');

// Code cards
const hsl = hexToHSL(colorHex);
document.getElementById('codeRow').innerHTML = `
  <div class="code-card">
    <div class="code-label">Hex Code</div>
    <div class="code-value">${colorHex} <button class="copy-btn" onclick="copy('${colorHex}')">Copy</button></div>
  </div>
  <div class="code-card">
    <div class="code-label">RGB</div>
    <div class="code-value">rgb(${colorRgb}) <button class="copy-btn" onclick="copy('rgb(${colorRgb})')">Copy</button></div>
  </div>
  <div class="code-card">
    <div class="code-label">HSL</div>
    <div class="code-value">hsl(${hsl[0]},${hsl[1]}%,${hsl[2]}%) <button class="copy-btn" onclick="copy('hsl(${hsl[0]},${hsl[1]}%,${hsl[2]}%)')">Copy</button></div>
  </div>
  <div class="code-card">
    <div class="code-label">HTML Name</div>
    <div class="code-value">${colorName.toLowerCase()} <button class="copy-btn" onclick="copy('${colorName.toLowerCase()}')">Copy</button></div>
  </div>
  <div class="code-card">
    <div class="code-label">CSS Variable</div>
    <div class="code-value" style="font-size:12px;">--color-${colorName.toLowerCase()} <button class="copy-btn" onclick="copy('--color-${colorName.toLowerCase()}:${colorHex}')">Copy</button></div>
  </div>
  <div class="code-card">
    <div class="code-label">Family</div>
    <div class="code-value">${colorFamily}</div>
  </div>
`;

// Swatches
document.getElementById('swatchRow').innerHTML = `
  <div class="swatch-block main" style="background:${colorHex};flex:3;"></div>
  <div class="swatch-block tint" style="background:${colorHex};flex:2;"></div>
  <div class="swatch-block shade" style="background:${colorHex};flex:2;"></div>
`;

// Description
document.getElementById('descText').textContent = getDescription(colorName, colorFamily);

// Stats
document.getElementById('statsGrid').innerHTML = `
  <div class="stat-cell">
    <div class="stat-label">Status</div>
    <div class="stat-value ${isLaunched?'launched-val':''}">${isLaunched?'Launched':'Available'}</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Coin</div>
    <div class="stat-value">${isLaunched?coinName:'—'}</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Lightness</div>
    <div class="stat-value">${hsl[2]}%</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Saturation</div>
    <div class="stat-value">${hsl[1]}%</div>
  </div>
`;

// CTA
document.getElementById('ctaBlock').innerHTML = isLaunched
  ? `<div class="cta-title">${coinName} is Live</div>
     <p class="cta-sub">This color has been claimed and launched as a Color Coin. Trade it on Pump.fun and vote with $COC to direct its weekly rewards.</p>
     <a href="dapp.html" class="cta-btn">Vote in DApp</a><br>
     <a href="spectrum.html" class="cta-btn ghost" style="margin-top:10px;display:inline-block;">← Back to Spectrum</a>`
  : `<div class="cta-title">Propose This Color</div>
     <p class="cta-sub">This color hasn't been launched yet. $COC holders can vote to introduce ${colorName} as the next Color Coin on Pump.fun.</p>
     <a href="dapp.html" class="cta-btn">Vote to Launch</a><br>
     <a href="spectrum.html" class="cta-btn ghost" style="margin-top:10px;display:inline-block;">← Back to Spectrum</a>`;

// Nearby
const nearby = COLORS.filter(c => c.family === colorFamily && c.name !== colorName).slice(0,8);
